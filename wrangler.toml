name = "moretransfer-worker"
main = "src/index.ts"
compatibility_date = "2026-05-08"
workers_dev = true

# -----------------------------
# DEV ENVIRONMENT
# -----------------------------
[env.dev]
name = "yootransfer-worker-dev"

[[env.dev.containers]]
max_instances = 1
# Has to be lowercase
name = "zipcontainerdo_dev"
class_name = "ZipContainerDO"
image = "./container/Dockerfile"

# R2
[[env.dev.r2_buckets]]
binding = "SOURCE_BUCKET"
bucket_name = "yoootransfer-dev"

[[env.dev.r2_buckets]]
binding = "OUTPUT_BUCKET"
bucket_name = "yoootransfer-dev"

# Queues
[[env.dev.queues.consumers]]
queue = "yoootransfer-worker-queue-dev"
max_batch_size = 1
max_retries = 3
dead_letter_queue = "yoootransfer-worker-queue-dev-dlq"

[[env.dev.queues.producers]]
binding = "QUEUE_WORKER_MAIN"
queue = "yoootransfer-worker-queue-dev"

# Durable Objects
[[env.dev.durable_objects.bindings]]
name = "ZipLocks"
class_name = "ZipLocksDO"

[[env.dev.durable_objects.bindings]]
name = "JobManager"
class_name = "JobManagerDO"

[[env.dev.durable_objects.bindings]]
name = "ZipSemaphore"
class_name = "ZipSemaphoreDO"

[[env.dev.durable_objects.bindings]]
name = "ZipContainer"
class_name = "ZipContainerDO"

# Vars
[env.dev.vars]
# http://localhost:3000
WEB_API_BASE_URL = "https://cce5-2605-a200-3000-6a1e-2184-3c74-7271-c5f2.ngrok-free.app" 
ZIP_OUTPUT_PREFIX = "bundle"
ZIP_OUTPUT_FILE_NAME = "moretransfer_bundle_dev"
MAX_FILES = "500"
BASE_RETRY_DELAY_SECONDS = 30
MAX_ZIP_BYTES = "68719476736" # 100 GiB
STREAM_REQUIRE_SIGNED_URLS = true

# ZIP v2 (containers)
ZIP_USE_CONTAINERS = true
ZIP_GLOBAL_CONCURRENCY = "1"
ZIP_MANIFEST_PREFIX = "manifests"
ZIP_PART_SIZE_BYTES = "134217728" # 128 MiB
ZIP_MAX_PARTS_PER_TICK = "8"

# Secret used in the API
# SECRET_KEY = ""
# CLOUDFLARE_ACCOUNT_ID = "" 
# CLOUDFLARE_STREAM_API_TOKEN = ""

# DO migrations (per env)
[[env.dev.migrations]]
tag = "v1"
new_classes = ["ZipLocksDO"]

[[env.dev.migrations]]
tag = "v2"
new_sqlite_classes = ["JobManagerDO", "ZipSemaphoreDO", "ZipContainerDO"]

# Cron Triggers
# [env.dev.triggers]
# crons = ["0 */3 * * *", "0 9 * * *", "*/30 * * * *"]

# -----------------------------
# PROD ENVIRONMENT
# -----------------------------
[env.prod]
name = "moretransfer-worker-prod"

[[env.prod.containers]]
max_instances = 3
class_name = "ZipContainerDO"
image = "./container/Dockerfile"

# [[env.prod.routes]]
# pattern = "shop.example.com"
# custom_domain = true

# R2
[[env.prod.r2_buckets]]
binding = "SOURCE_BUCKET"
bucket_name = "moretransfer-storage"

[[env.prod.r2_buckets]]
binding = "OUTPUT_BUCKET"
bucket_name = "moretransfer-storage"

# Queues
[[env.prod.queues.consumers]]
queue = "moretransfer-worker-queue"
max_batch_size = 1
max_retries = 3
dead_letter_queue = "moretransfer-worker-queue-dlq"

[[env.prod.queues.producers]]
binding = "QUEUE_WORKER_MAIN"
queue = "moretransfer-worker-queue"

# Durable Objects
[[env.prod.durable_objects.bindings]]
name = "ZipLocks"
class_name = "ZipLocksDO"

[[env.prod.durable_objects.bindings]]
name = "JobManager"
class_name = "JobManagerDO"

[[env.prod.durable_objects.bindings]]
name = "ZipSemaphore"
class_name = "ZipSemaphoreDO"

[[env.prod.durable_objects.bindings]]
name = "ZipContainer"
class_name = "ZipContainerDO"

# Logging and Observability
[observability]
enabled = true
head_sampling_rate = 1

[limits]
cpu_ms = 300_000

# Vars
[env.prod.vars]
# Use www (canonical); apex redirects to www via 301, which would convert POST→GET (405)
WEB_API_BASE_URL = "https://www.moretransfer.com"
BASE_RETRY_DELAY_SECONDS = 30
ZIP_OUTPUT_PREFIX = "bundle"
ZIP_OUTPUT_FILE_NAME = "moretransfer_bundle"
MAX_FILES = "500"
MAX_ZIP_BYTES = "68719476736" # 64 GiB

# ZIP v2 (containers)
ZIP_USE_CONTAINERS = true
ZIP_GLOBAL_CONCURRENCY = "3"
ZIP_MANIFEST_PREFIX = "manifests"
ZIP_PART_SIZE_BYTES = "134217728" # 128 MiB
ZIP_MAX_PARTS_PER_TICK = "8"

# Requires signing to preview videos from Cloudflare Stream 
# (set to false to allow public playback during ingest)
STREAM_REQUIRE_SIGNED_URLS=true 

# Stored in Secret - wrangler secret put CLOUDFLARE_STREAM_API_TOKEN --env prod
# SECRET_KEY = "" 
# CLOUDFLARE_ACCOUNT_ID = ""
# CLOUDFLARE_STREAM_API_TOKEN = ""

# DO migrations (per env)
[[env.prod.migrations]]
tag = "v1"
new_classes = ["ZipLocksDO"]

[[env.prod.migrations]]
tag = "v2"
new_sqlite_classes = ["JobManagerDO", "ZipSemaphoreDO", "ZipContainerDO"]

# Cron Triggers
[env.prod.triggers]
crons = ["0 */3 * * *", "0 9 * * *", "*/30 * * * *"] # cleanup + daily expiry + review digest poller
